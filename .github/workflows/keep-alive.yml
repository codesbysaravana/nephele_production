name: Keep Render Server Awake

on:
  schedule:
    # Runs every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allows to run it manually from the GitHub UI 

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the FastAPI Backend
        run: curl -sSf https://nephele-dsoa.onrender.com || echo "Ping failed, but workflow will continue"
